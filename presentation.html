<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>عرض نظام جاهزية سباهي (ReadyCBAHI) - تجمع الجوف الصحي</title>
    <!-- استدعاء خطوط جوجل (Tajawal) لتعطي طابع احترافي ورسمي -->
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary: #0D9488;
            --secondary: #1E293B;
            --accent: #14B8A6;
            --bg-glass: rgba(255, 255, 255, 0.95);
        }

        * {
            box-sizing: border-box;
            font-family: 'Tajawal', sans-serif;
        }

        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #0F172A, #1E293B);
            color: #fff;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            alignItems: center;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 10;
        }

        .header h1 {
            margin: 0;
            font-size: 24px;
            font-weight: 800;
            color: #fff;
        }

        .header-logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-logo img {
            height: 40px;
            background: white;
            padding: 4px;
            border-radius: 8px;
        }

        .slide-container {
            flex: 1;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px;
        }

        .slide {
            position: absolute;
            transition: opacity 0.8s ease-in-out, transform 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
            opacity: 0;
            transform: scale(0.95) translateY(20px);
            pointer-events: none;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .slide.active {
            opacity: 1;
            transform: scale(1) translateY(0);
            pointer-events: auto;
        }

        .slide-image-wrapper {
            position: relative;
            width: 80%;
            max-width: 1100px;
            height: 55vh;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 24px 64px rgba(0, 0, 0, 0.5);
            border: 2px solid rgba(255, 255, 255, 0.1);
            background: #0f172a;
        }

        .slide-image-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            /* Change to contain if screenshots clip */
            transition: transform 10s linear;
        }

        .slide.active .slide-image-wrapper img {
            transform: scale(1.05);
            /* Slight zoom effect over time */
        }

        .script-box {
            margin-top: 30px;
            background: var(--bg-glass);
            color: #1E293B;
            padding: 24px 34px;
            border-radius: 20px;
            width: 80%;
            max-width: 1100px;
            font-size: 22px;
            font-weight: 700;
            line-height: 1.6;
            text-align: center;
            box-shadow: 0 16px 40px rgba(0, 0, 0, 0.3);
            position: relative;
        }

        .script-box::before {
            content: "🎙️ سكريبت الشرح";
            position: absolute;
            top: -16px;
            right: 30px;
            background: var(--primary);
            color: white;
            padding: 4px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 800;
        }

        .controls {
            padding: 20px 40px;
            background: rgba(15, 23, 42, 0.8);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: center;
            gap: 20px;
            align-items: center;
        }

        button {
            padding: 12px 30px;
            border-radius: 12px;
            border: none;
            font-size: 16px;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--accent));
            color: white;
        }

        .btn-primary:active {
            transform: scale(0.95);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .audio-status {
            font-size: 14px;
            font-weight: 700;
            color: #14B8A6;
            display: flex;
            alignItems: center;
            gap: 8px;
        }

        .pulse {
            width: 10px;
            height: 10px;
            background: #14B8A6;
            border-radius: 50%;
            animation: pulse-dot 1.5s infinite;
        }

        @keyframes pulse-dot {
            0% {
                box-shadow: 0 0 0 0 rgba(20, 184, 166, 0.7);
            }

            70% {
                box-shadow: 0 0 0 10px rgba(20, 184, 166, 0);
            }

            100% {
                box-shadow: 0 0 0 0 rgba(20, 184, 166, 0);
            }
        }

        /* Input API Key Modal */
        #api-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(8px);
            z-index: 100;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: white;
            color: #1E293B;
            padding: 40px;
            border-radius: 24px;
            text-align: center;
            width: 450px;
        }

        .modal-content input {
            width: 100%;
            padding: 14px;
            margin: 20px 0;
            border: 2px solid #E2E8F0;
            border-radius: 12px;
            font-size: 16px;
            font-family: inherit;
        }
    </style>
</head>

<body>

    <!-- Modal لإدخال مفتاح الـ API للـ Text-to-Speech -->
    <div id="api-modal">
        <div class="modal-content">
            <h2 style="margin:0 0 10px; color:#0F172A;">مفتاح Google Cloud TTS</h2>
            <p style="color:#64748B; font-size:14px; margin:0;">أدخل مفتاح الـ API الخاص بـ Google Cloud لتشغيل الصوت
                باللهجة السعودية (صوت Sadachbia)</p>
            <input type="password" id="api-key-input" placeholder="AIzaSy...">
            <button class="btn-primary" style="width:100%" onclick="saveApiKey()">بدء العرض التقديمي</button>
            <button class="btn-secondary" style="width:100%; background:#F1F5F9; color:#64748B; margin-top:10px;"
                onclick="skipApiKey()">الدخول بدون صوت (للقراءة فقط)</button>
        </div>
    </div>

    <!-- Header -->
    <div class="header">
        <div class="header-logo">
            <img src="./frontend/public/logo.png" alt="Logo" onerror="this.src='https://via.placeholder.com/40'">
            <h1>نظام متابعة جودة الأداء والامتثال - المراجعة النهائية</h1>
        </div>
        <div class="audio-status" id="audio-status" style="display:none;">
            <div class="pulse"></div> يتحدث الان...
        </div>
    </div>

    <!-- Slides -->
    <div class="slide-container" id="slides-container">
        <!-- سيتم إنشاؤها عبر الجافاسكريبت -->
    </div>

    <!-- Controls -->
    <div class="controls">
        <button class="btn-secondary" onclick="prevSlide()">السابق</button>
        <span id="slide-counter" style="font-weight:700; font-size:18px;">1 / X</span>
        <button class="btn-primary" onclick="nextSlide()">التالي</button>
    </div>

    <script>
        // ==========================================
        // مسار الصور المؤقت (يفضل تغييرها إلى مسارات سكرين شوت حقيقية التقطتها)
        // يمكنك استخدام Snipping Tool لأخذ لقطات، ووضعها في مجلد وبنفس الأسماء
        // ==========================================

        const slidesData = [
            {
                image: 'slides_images/1_login.png',
                fallback: 'https://images.unsplash.com/photo-1497215728101-856f4ea42174?auto=format&fit=crop&q=80&w=1200',
                script: "السلام عليكم ورحمة الله وبركاته، السادة الكرام الإدارة الكريمة، مرحباً بكم في العرض الختامي لنظام استدامة جودة الأداء والامتثال، المصمم خصيصاً لتجمع الجوف الصحي. النظام يضمن الأمان وتوزيع الصلاحيات عبر شاشة دخول مرتبطة بقواعد بيانات محمية، تتيح لكل مفتش ومدير نظام دخولاً مخصصاً يعرض ما يحتاجه فقط."
            },
            {
                image: 'slides_images/2_about.png',
                fallback: 'https://images.unsplash.com/photo-1573497620053-ea5300f94f21?auto=format&fit=crop&q=80&w=1200',
                script: "مباشرة بعد الدخول، قمنا ببناء قسم تعريفي احترافي يوضح رسالة قسم الاستدامة والالتزام بالاعتماد. يعرض هذا القسم مهام الفريق، مثل تنفيذ التقييمات ومتابعة الإجراءات التصحيحية، مع عرض حي ومباشر لنطاق العمل الشامل الذي يُغطي المستشفيات والمراكز الأولية بتصميم زجاجي عصري."
            },
            {
                image: 'slides_images/3_form.png',
                fallback: 'https://images.unsplash.com/photo-1555421689-491a97ff2040?auto=format&fit=crop&q=80&w=1200',
                script: "هنا يكمن قلب النظام، نموذج التقييم الميداني. صممناه ليكون واسعاً يملأ كامل الشاشة في أجهزة الكمبيوتر، مع أزرار لمسية كبيرة لتسجيل حالة الامتثال (مطابق، جزئي، أو غير مطابق). بمجرد إدخال نتيجة سلبية، يطلب النظام فوراً خطة تصحيحية، مما يضمن عدم وجود أي ثغرات رقابية."
            },
            {
                image: 'slides_images/4_analytics.png',
                fallback: 'https://images.unsplash.com/photo-1551288049-bebda4e38f71?auto=format&fit=crop&q=80&w=1200',
                script: "ولأن الأرقام هي لغة الإدارة، وفرنا شاشة التحليل الإحصائي الكامل. تعرض بشكل رسوم بيانية نسبة الامتثال العامة لكل قطاع طبي، لمعرفة أين تكمن نقاط القوة وأين نحتاج إلى تدخل. النظام يحسب النسب تلقائياً ويوفر نظرة فورية ومباشرة لقيادات التجمع."
            },
            {
                image: 'slides_images/5_compare.png',
                fallback: 'https://images.unsplash.com/photo-1460925895917-afdab827c52f?auto=format&fit=crop&q=80&w=1200',
                script: "من نقاط القوة المتميزة، ميزة المقارنات المتقدمة؛ حيث يستطيع النظام استعراض عشرات المنشآت الطبية في نفس اللحظة عبر فلاتر ذكية. يميز النظام تلقائياً بين التقارير المعتمدة والمرفوضة والمنشآت التي لم تتم زيارتها بعد، مع إبراز كل حالة بلون دلالي صريح للفرز السريع."
            },
            {
                image: 'slides_images/6_reports.png',
                fallback: 'https://images.unsplash.com/photo-1618044733300-9472054094ee?auto=format&fit=crop&q=80&w=1200',
                script: "لم ننسَ الجانب التوثيقي المعياري للجهات الرقابية. بضغطة زر واحدة، يستخرج النظام تقارير نهائية بصيغة بِيدِي إِف أو طباعتها فوراً. التقرير يشمل الهوية البصرية لتجمع الجوف الصحي، وختماً إلكترونياً لنتيجة الزيارة سواء كانت مقبولة للتدخل الروتيني أو تتطلب تدخلاً عاجلاً."
            },
            {
                image: 'slides_images/7_approvals_notifs.png',
                fallback: 'https://images.unsplash.com/photo-1504868584819-f8e8b4b6d7e3?auto=format&fit=crop&q=80&w=1200',
                script: "أما من الناحية الإدارية الكبرى، فوفرنا بوابة 'الاعتمادات'، المخصصة لمدير النظام. من هنا يراقب المدير جميع جولات المفتشين، ويمكنه بضغطة واحدة قبول الزيارة أو رفضها وإرجاعها للمفتش بملاحظات مكتوبة. وكل هذه الإجراءات ترتبط بشكل سلس وفوري مع نظام الإشعارات الداخلي للمستخدمين."
            },
            {
                image: 'slides_images/8_mobile.png',
                fallback: 'https://images.unsplash.com/photo-1512941937669-90a1b58e7e9c?auto=format&fit=crop&q=80&w=1200',
                script: "وأخيراً، ولأن العمليات الميدانية لا تنتظر، صممنا النظام بأعلى معايير تجربة المستخدم ليكون متجاوباً بالكامل وتلقائياً مع الهواتف الذكية. تظهر قائمة سفلية احترافية تتيح للمفتش تعبئة بيانات الزيارات أو للمدير مراجعة الاعتمادات، بشكل كامل ومن راحة يده، أينما كان. هذا هو نظام القيادة والإنجاز. شكراً لثقتكم."
            }
        ];

        let currentSlide = 0;
        let apiKey = '';
        let isSkipped = false;
        let currentAudio = null;

        function init() {
            const container = document.getElementById('slides-container');
            slidesData.forEach((slide, index) => {
                const div = document.createElement('div');
                div.className = `slide ${index === 0 ? 'active' : ''}`;
                div.id = `slide-${index}`;

                div.innerHTML = `
            <div class="slide-image-wrapper">
                <img src="${slide.image}" onerror="this.src='${slide.fallback}'" alt="Slide ${index + 1}">
            </div>
            <div class="script-box">
                ${slide.script}
            </div>
        `;
                container.appendChild(div);
            });
            updateCounter();
        }

        function saveApiKey() {
            const key = document.getElementById('api-key-input').value.trim();
            if (key) {
                apiKey = key;
                document.getElementById('api-modal').style.display = 'none';
                playCurrentScript();
            } else {
                alert('الرجاء إدخال المفتاح');
            }
        }

        function skipApiKey() {
            isSkipped = true;
            document.getElementById('api-modal').style.display = 'none';
        }

        function updateCounter() {
            document.getElementById('slide-counter').innerText = `${currentSlide + 1} / ${slidesData.length}`;
        }

        async function playCurrentScript() {
            if (isSkipped || !apiKey) return;

            // Stop any playing audio
            if (currentAudio) {
                currentAudio.pause();
                currentAudio = null;
            }

            const scriptText = slidesData[currentSlide].script;
            document.getElementById('audio-status').style.display = 'flex';

            try {
                const response = await fetch(`https://texttospeech.googleapis.com/v1/text:synthesize?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        input: { text: scriptText },
                        voice: {
                            languageCode: 'ar-SA',
                            name: 'ar-SA-Wavenet-C' // الصوت الذكوري الاحترافي السعودي
                        },
                        audioConfig: {
                            audioEncoding: 'MP3',
                            speakingRate: 0.95, // هدوء واحترافية في النطق
                            pitch: -2.00
                        }
                    })
                });

                const data = await response.json();

                if (data.audioContent) {
                    const audioSrc = 'data:audio/mp3;base64,' + data.audioContent;
                    currentAudio = new Audio(audioSrc);
                    currentAudio.play();
                    currentAudio.onended = () => {
                        document.getElementById('audio-status').style.display = 'none';
                    };
                } else {
                    console.error('Error in TTS Request:', data);
                    document.getElementById('audio-status').style.display = 'none';
                }

            } catch (err) {
                console.error('Failed to play audio:', err);
                document.getElementById('audio-status').style.display = 'none';
            }
        }

        function showSlide(index) {
            if (index < 0 || index >= slidesData.length) return;

            document.querySelector('.slide.active').classList.remove('active');
            document.getElementById(`slide-${index}`).classList.add('active');

            currentSlide = index;
            updateCounter();
            playCurrentScript();
        }

        function nextSlide() { showSlide(currentSlide + 1); }
        function prevSlide() { showSlide(currentSlide - 1); }

        // Keyboard navigation
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') prevSlide();
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown' || e.key === 'Space') nextSlide();
        });

        // Initialize on load
        window.onload = init;

    </script>
</body>

</html>
